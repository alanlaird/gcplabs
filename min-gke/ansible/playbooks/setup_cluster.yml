---
- name: Setup GKE Cluster Configuration
  hosts: localhost
  gather_facts: yes
  vars:
    cluster_name: "min-gke-cluster"
    project_id: "{{ lookup('env', 'GCP_PROJECT_ID') }}"
    region: "us-central1"
    kubeconfig_path: "~/.kube/config"

  tasks:
    - name: Get cluster credentials
      shell: |
        gcloud container clusters get-credentials {{ cluster_name }} \
          --region={{ region }} \
          --project={{ project_id }}
      environment:
        PATH: "{{ ansible_env.PATH }}"

    - name: Wait for cluster to be ready
      shell: |
        kubectl get nodes --no-headers | wc -l
      register: nodes_ready
      until: nodes_ready.stdout | int >= 1
      retries: 30
      delay: 10

    - name: Display cluster info
      shell: kubectl cluster-info
      register: cluster_info

    - name: Show cluster information
      debug:
        msg: "{{ cluster_info.stdout_lines }}"

    - name: Get nodes
      shell: kubectl get nodes -o wide
      register: nodes_list

    - name: Display nodes
      debug:
        msg: "{{ nodes_list.stdout }}"

    - name: Install kubectl plugins for cost analysis
      shell: |
        kubectl krew install cost-analyzer || true
      ignore_errors: yes

- name: Deploy Monitoring and Logging
  hosts: localhost
  gather_facts: no

  tasks:
    - name: Create monitoring namespace
      kubernetes.core.k8s:
        name: monitoring
        api_version: v1
        kind: Namespace
        state: present

    - name: Create resource quotas for cost control
      kubernetes.core.k8s:
        namespace: default
        definition:
          apiVersion: v1
          kind: ResourceQuota
          metadata:
            name: default-quota
          spec:
            hard:
              requests.cpu: "4"
              requests.memory: "8Gi"
              limits.cpu: "8"
              limits.memory: "16Gi"
              pods: "20"
        state: present

    - name: Create network policy for security
      kubernetes.core.k8s:
        namespace: default
        definition:
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: default-deny-ingress
          spec:
            podSelector: {}
            policyTypes:
              - Ingress
        state: present
